<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .msg {
    color: #2a2a2a;
    font-size: 11px;
    letter-spacing: 0.3em;
    font-family: monospace;
    text-align: center;
    line-height: 2.2em;
  }
</style>
</head>
<body>
<div class="msg" id="msg"></div>
<script>
  const path = location.pathname.toLowerCase();

  let text = '違う。だが諦めるな。間違いも情報である。';

  if (path === '/hint') {
    text = 'ここには何もない。';
  } else if (path === '/answer') {
    text = '答えを求めるな。問いを求めよ。';
  } else if (/^\/(s1|s2|s3|s4|s5|s6|s7|s8|s9|s10)$/.test(path)) {
    text = '近道はない。';
  }

  document.getElementById('msg').textContent = text;
</script>
</body>
</html>
