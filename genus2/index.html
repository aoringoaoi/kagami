<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    color: #cccccc;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
  }
  .container {
    max-width: 560px;
    width: 100%;
  }
  .label {
    font-size: 10px;
    color: #444;
    letter-spacing: 0.3em;
    margin-bottom: 40px;
    text-align: center;
  }
  .problem {
    border-left: 2px solid #cc0000;
    padding: 24px 28px;
    margin-bottom: 48px;
    line-height: 2.2;
    font-size: 13px;
    color: #aaaaaa;
    letter-spacing: 0.08em;
  }
  .problem .em { color: #cc0000; }
  .crypto-block {
    background: #0d0d0d;
    border: 1px solid #222;
    padding: 28px;
    margin-bottom: 16px;
  }
  .crypto-label {
    font-size: 9px;
    color: #444;
    letter-spacing: 0.3em;
    margin-bottom: 12px;
  }
  .crypto-val {
    font-size: 13px;
    color: #888;
    word-break: break-all;
    line-height: 1.8;
  }
  .crypto-val span { color: #cc6600; }
  .instruction {
    margin-top: 48px;
    font-size: 11px;
    color: #444;
    line-height: 2.0;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .instruction .key { color: #666; }
  .dim {
    color: #222;
    font-size: 10px;
    margin-top: 80px;
    letter-spacing: 0.2em;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="label">:: GENUS-2 ::</div>
  <div class="problem">
    辺の数は <span class="em">7</span><br>
    面の数は奇数<br>
    オイラー標数は <span class="em">-1</span><br>
    <br>
    答えは曲面の名前だ<br>
    その名前が鍵になる
  </div>
  <div class="crypto-block">
    <div class="crypto-label">PUBLIC KEY</div>
    <div class="crypto-val">
      n = <span>3233</span><br>
      e = <span>17</span>
    </div>
  </div>
  <div class="crypto-block">
    <div class="crypto-label">CIPHERTEXT</div>
    <div class="crypto-val">
      <span>3123 1486 1859 1859 1307 1859</span>
    </div>
  </div>
  <div class="instruction">
    曲面を特定せよ<br>
    <span class="key">秘密鍵を導け</span><br>
    暗号文を復号せよ<br>
    復号された文字列が次の扉を示す
  </div>
  <div class="dim">:: k4g4m1 ::</div>
</div>
</body>
</html>
